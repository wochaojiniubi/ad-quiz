<html lang="zh-CN">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f5f5f5;color:#333;min-height:100vh;
  -webkit-tap-highlight-color:transparent;
  user-select:none;-webkit-user-select:none;
}

/* Header */
.header{
  position:sticky;top:0;z-index:10;background:#fff;
  border-bottom:1px solid #e0e0e0;padding:12px 16px;
}
.header h1{font-size:15px;text-align:center;margin-bottom:8px;color:#666}
.stats{display:flex;justify-content:space-around;font-size:13px;margin-bottom:8px}
.stats span{font-weight:600}
.stats .correct{color:#4caf50}
.stats .wrong{color:#f44336}
.progress-bar{
  height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden;
}
.progress-fill{height:100%;background:#1976d2;transition:width .3s}

/* Filter */
.filter{
  display:flex;gap:6px;padding:8px 12px;background:#fff;
  border-bottom:1px solid #e0e0e0;overflow-x:auto;
  position:sticky;top:95px;z-index:9;
}
.filter button{
  flex-shrink:0;border:1px solid #ddd;background:#fff;
  padding:6px 14px;border-radius:16px;font-size:13px;
  cursor:pointer;white-space:nowrap;
}
.filter button.active{background:#1976d2;color:#fff;border-color:#1976d2}

/* Main area */
.main{padding:12px 12px 100px}

/* Question card */
.qcard{
  background:#fff;border-radius:12px;padding:16px;
  margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.1);
}
.qcard.answered{border-left:3px solid #4caf50}
.qcard.wrong{border-left:3px solid #f44336}
.qcard.skipped{opacity:.85}

.qheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qnum{font-size:14px;font-weight:700;color:#1976d2}
.qtype{font-size:11px;color:#999;background:#f0f0f0;padding:2px 8px;border-radius:10px}
.qtext{font-size:15px;line-height:1.6;margin-bottom:12px;color:#222}

/* Options */
.options{display:flex;flex-direction:column;gap:8px}
.option{
  display:flex;align-items:flex-start;padding:12px 14px;
  border:2px solid #e8e8e8;border-radius:10px;
  cursor:pointer;transition:all .15s;font-size:14px;
  line-height:1.5;
}
.option:active{transform:scale(.98)}
.option .label{
  flex-shrink:0;width:28px;height:28px;border-radius:50%;
  background:#f0f0f0;display:flex;align-items:center;
  justify-content:center;font-weight:700;font-size:13px;
  margin-right:10px;color:#666;
}
.option.correct{border-color:#4caf50;background:#e8f5e9}
.option.correct .label{background:#4caf50;color:#fff}
.option.wrong{border-color:#f44336;background:#ffebee}
.option.wrong .label{background:#f44336;color:#fff}
.option.reveal{border-color:#4caf50;background:#f1f8e9}
.option.reveal .label{background:#4caf50;color:#fff}
.option.dim{opacity:.5}

/* Feedback */
.feedback{
  margin-top:10px;padding:10px 14px;border-radius:8px;
  font-size:13px;line-height:1.5;display:none;
}
.feedback.show{display:block}
.feedback.correct-fb{background:#e8f5e9;color:#2e7d32}
.feedback.wrong-fb{background:#ffebee;color:#c62828}
.feedback .fb-label{font-weight:700;margin-bottom:4px}
.feedback .retry-btn{
  margin-top:8px;padding:6px 16px;background:#1976d2;color:#fff;
  border:none;border-radius:6px;font-size:13px;cursor:pointer;
}

/* Bottom nav */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:1px solid #e0e0e0;padding:10px 16px;
  display:flex;justify-content:space-between;align-items:center;
  z-index:10;gap:10px;
}
.bottom-nav button{
  flex:1;padding:10px;border:1px solid #1976d2;background:#fff;
  color:#1976d2;border-radius:8px;font-size:14px;cursor:pointer;
}
.bottom-nav button:active{opacity:.7}
.bottom-nav button.primary{background:#1976d2;color:#fff}
.bottom-nav .page-indicator{font-size:13px;color:#999;text-align:center;min-width:80px}

/* Responsive */
@media(min-width:768px){
  .main{max-width:700px;margin:0 auto}
  .header,.filter{border-radius:0}
}
</style>

pe": "single"}, {"q": 564, "text": "【智能放量】是一款帮助广告对已选择的\"可放开定大转化）计划", "options": [{"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "B", "explanation": "", "type": "single"}, {"q": 565, "text": "【智能放量】是一款帮助广告对已选择的\"可放开定向在合适的时间节点放开定向的产品，由系统自动优选定向范围外的目标人群，提升广告跑量。", "options": [{"label": "A", "text": "正确"}, {"label": "A", "text": "正确"}, {"label": "B", "text": "错误"}], "answer": "A", "explanation": "", "type": "single"}];

// ===== STATE =====
var STATE = {
  answers: {},     // {qNum: {selected: 'A', correct: true, time: 123}}
  currentIndex: 0,
  filter: 'all'
};

// ===== PERSISTENCE =====
var STORAGE_KEY = 'quiz_107pages_565';
function loadState(){
  try{
    var raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      var saved = JSON.parse(raw);
      STATE.answers = saved.answers || {};
      STATE.currentIndex = saved.currentIndex || 0;
      STATE.filter = saved.filter || 'all';
    }
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      answers: STATE.answers,
      currentIndex: STATE.currentIndex,
      filter: STATE.filter
    }));
  }catch(e){}
}
function clearState(){
  if(confirm('确定清空所有答题进度？此操作不可撤销。')){
    STATE.answers = {};
    STATE.currentIndex = 0;
    STATE.filter = 'all';
    localStorage.removeItem(STORAGE_KEY);
    renderAll();
  }
}

// ===== HELPERS =====
function getFilteredQuestions(){
  var qs = QUESTIONS.slice();
  if(STATE.filter === 'unanswered'){
    qs = qs.filter(function(q){ return !STATE.answers[q.q]; });
  }else if(STATE.filter === 'wrong'){
    qs = qs.filter(function(q){ return STATE.answers[q.q] && !STATE.answers[q.q].correct; });
  }else if(STATE.filter === 'answered'){
    qs = qs.filter(function(q){ return STATE.answers[q.q]; });
  }else if(STATE.filter === 'tf'){
    qs = qs.filter(function(q){ return q.type === 'tf'; });
  }
  return qs;
}

function getStats(){
  var total = QUESTIONS.length;
  var answered = Object.keys(STATE.answers).length;
  var correct = 0, wrong = 0;
  Object.values(STATE.answers).forEach(function(a){
    if(a.correct) correct++; else wrong++;
  });
  return {total: total, answered: answered, correct: correct, wrong: wrong};
}

function getCurrentQuestion(){
  var qs = getFilteredQuestions();
  if(qs.length === 0) return null;
  if(STATE.currentIndex >= qs.length) STATE.currentIndex = qs.length - 1;
  if(STATE.currentIndex < 0) STATE.currentIndex = 0;
  return qs[STATE.currentIndex];
}

// ===== RENDER =====
function renderAll(){
  saveState();
  updateHeader();
  renderFilter();
  renderQuestion();
}

function updateHeader(){
  var stats = getStats();
  document.getElementById('answeredCount').textContent = stats.answered;
  document.getElementById('totalCount').textContent = stats.total;
  document.getElementById('correctCount').textContent = stats.correct;
  document.getElementById('wrongCount').textContent = stats.wrong;
  var pct = stats.total > 0 ? (stats.answered / stats.total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderFilter(){
  var btns = document.querySelectorAll('.filter button[data-filter]');
  btns.forEach(function(b){
    b.classList.toggle('active', b.dataset.filter === STATE.filter);
  });
}

function renderQuestion(){
  var q = getCurrentQuestion();
  var main = document.getElementById('main');
  var qs = getFilteredQuestions();

  document.getElementById('pageIndicator').textContent = qs.length > 0 ? (STATE.currentIndex + 1) + '/' + qs.length : '0/0';

  if(!q){
    main.innerHTML = '<div style=\"text-align:center;padding:60px 20px;color:#999\">此筛选条件下没有题目</div>';
    return;
  }

  var ans = STATE.answers[q.q];
  var answered = !!ans;
  var html = '<div class=\"qcard' + (answered ? (ans.correct ? ' answered' : ' wrong') : ' skipped') + '\">';

  // Header
  html += '<div class=\"qheader\">';
  html += '<span class=\"qnum\">第 ' + q.q + ' 题</span>';
  html += '<span class=\"qtype\">' + (q.type === 'tf' ? '判断题' : '单选题') + '</span>';
  html += '</div>';

  // Question text
  html += '<div class=\"qtext\">' + escapeHtml(q.text) + '</div>';

  // Options
  html += '<div class=\"options\">';
  q.options.forEach(function(opt){
    var cls = 'option';
    if(answered){
      if(opt.label === q.answer){
        cls += ' reveal'; // always show correct answer
      }else if(opt.label === ans.selected && !ans.correct){
        cls += ' wrong'; // user's wrong selection
      }
      if(opt.label !== q.answer && opt.label !== ans.selected){
        cls += ' dim';
      }
    }
    if(!answered){
      cls += ' selectable';
    }
    html += '<div class=\"' + cls + '\" data-label=\"' + opt.label + '\" data-q=\"' + q.q + '\">';
    html += '<span class=\"label\">' + escapeHtml(opt.label) + '</span>';
    html += '<span>' + escapeHtml(opt.text) + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Feedback
  if(answered){
    var fbCls = ans.correct ? 'correct-fb' : 'wrong-fb';
    var fbIcon = ans.correct ? '✓ 回答正确' : '✗ 回答错误';
    html += '<div class=\"feedback show ' + fbCls + '\">';
    html += '<div class=\"fb-label\">' + fbIcon + '</div>';
    if(!ans.correct){
      html += '<div>正确答案：<b>' + escapeHtml(q.answer) + '</b></div>';
    }
    if(q.explanation){
      html += '<div style=\"margin-top:4px;color:#666\">' + escapeHtml(q.explanation) + '</div>';
    }
    html += '<button class=\"retry-btn\" data-q=\"' + q.q + '\">重做本题</button>';
    html += '</div>';
  }

  html += '</div>';
  main.innerHTML = html;

  // Bind events
  bindOptionClicks();
  bindRetryBtns();
}

function escapeHtml(str){
  if(!str) return '';
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== EVENTS =====
function bindOptionClicks(){
  document.querySelectorAll('.option.selectable').forEach(function(el){
    el.addEventListener('click', function(){
      var qnum = parseInt(el.dataset.q);
      var label = el.dataset.label;
      var q = QUESTIONS.find(function(qq){ return qq.q === qnum; });
      if(!q) return;

      var correct = (label === q.answer);
      STATE.answers[qnum] = {
        selected: label,
        correct: correct,
        time: Date.now()
      };

      renderAll();

      // Auto-advance after short delay
      setTimeout(function(){
        var qs = getFilteredQuestions();
        if(STATE.currentIndex < qs.length - 1){
          STATE.currentIndex++;
          renderAll();
        }
      }, 800);
    });
  });
}

function bindRetryBtns(){
  document.querySelectorAll('.retry-btn').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var qnum = parseInt(el.dataset.q);
      delete STATE.answers[qnum];
      renderAll();
    });
  });
}

// Navigation
document.getElementById('prevBtn').addEventListener('click', function(){
  if(STATE.currentIndex > 0){
    STATE.currentIndex--;
    renderAll();
  }
});

document.getElementById('nextBtn').addEventListener('click', function(){
  var qs = getFilteredQuestions();
  if(STATE.currentIndex < qs.length - 1){
    STATE.currentIndex++;
    renderAll();
  }
});

// Filter buttons
document.querySelectorAll('.filter button[data-filter]').forEach(function(btn){
  btn.addEventListener('click', function(){
    STATE.filter = btn.dataset.filter;
    STATE.currentIndex = 0;
    renderAll();
  });
});

// Clear button
document.getElementById('clearBtn').addEventListener('click', clearState);

// Keyboard navigation
document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
    e.preventDefault();
    if(STATE.currentIndex > 0){ STATE.currentIndex--; renderAll(); }
  }else if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){
    e.preventDefault();
    var qs = getFilteredQuestions();
    if(STATE.currentIndex < qs.length - 1){ STATE.currentIndex++; renderAll(); }
  }
});

// Touch swipe
var touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', function(e){
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
document.addEventListener('touchend', function(e){
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50){
    var qs = getFilteredQuestions();
    if(dx < 0 && STATE.currentIndex < qs.length - 1){
      STATE.currentIndex++; renderAll();
    }else if(dx > 0 && STATE.currentIndex > 0){
      STATE.currentIndex--; renderAll();
    }
  }
});

// ===== INIT =====
loadState();
renderAll();
</script>
</body>
</html>
