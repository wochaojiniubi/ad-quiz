<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>题库</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#212529;min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}

/* Top bar */
.topbar{position:sticky;top:0;z-index:20;background:#fff;padding:10px 14px 6px;border-bottom:1px solid #eee}
.topbar h1{font-size:15px;font-weight:600;text-align:center;margin-bottom:8px}
.topbar .row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#666}
.topbar .row b{color:#333}
.topbar .home{font-size:12px;color:#999;text-decoration:none}

/* Modes */
.modes{display:flex;gap:6px;padding:8px 14px;background:#fff;border-bottom:1px solid #eee;overflow-x:auto;position:sticky;top:68px;z-index:19}
.modes button{flex-shrink:0;padding:7px 14px;border:1px solid #dee2e6;background:#fff;border-radius:20px;font-size:13px;cursor:pointer;color:#495057}
.modes button.on{background:#212529;color:#fff;border-color:#212529}
.modes button.exam{background:#f59e0b;color:#fff;border-color:#f59e0b}
.modes button.exam.on{background:#d97706}

/* Sub bar */
.subbar{display:flex;align-items:center;gap:6px;padding:6px 14px;background:#fff;border-bottom:1px solid #eee;font-size:12px;position:sticky;top:118px;z-index:18;justify-content:space-between}
.subbar .filter{display:flex;gap:4px;overflow-x:auto}
.subbar .filter button{flex-shrink:0;padding:3px 10px;border:1px solid #eee;background:#fff;border-radius:12px;font-size:11px;color:#888;cursor:pointer}
.subbar .filter button.on{background:#212529;color:#fff;border-color:#212529}
.subbar .actions{display:flex;gap:8px;font-size:11px;color:#888}
.subbar .actions span{cursor:pointer}
.subbar .actions span.danger{color:#e03131}

/* Exam status */
.exam-status{display:none;padding:6px 14px;background:#fffbeb;border-bottom:1px solid #fde68a;font-size:12px;text-align:center;position:sticky;top:156px;z-index:18}
.exam-status.show{display:block}

/* Main */
.main{padding:12px 14px 100px;max-width:720px;margin:0 auto}

/* Card */
.qcard{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.04);position:relative;border:1px solid #eee}
.qcard.answered{border-color:#d1fae5}
.qcard.failed{border-color:#fee2e2}
.qheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.qnum{font-size:14px;font-weight:700}
.qbadges{display:flex;gap:6px;font-size:10px}
.qbadges span{padding:2px 8px;border-radius:10px}
.badge-type{background:#e0e7ff;color:#4338ca}
.badge-mod{background:#f3e8ff;color:#7e22ce}
.badge-hot{background:#fee2e2;color:#dc2626}
.qtext{font-size:15px;line-height:1.7;margin-bottom:14px;color:#1a1a1a}

/* Options */
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;padding:12px 14px;border:1px solid #e5e7eb;border-radius:10px;cursor:pointer;transition:.12s;font-size:14px;line-height:1.5}
.opt:active{background:#f9fafb}
.opt .lb{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#f3f4f6;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;margin-right:10px;color:#6b7280}
.opt.ok{border-color:#22c55e;background:#f0fdf4}.opt.ok .lb{background:#22c55e;color:#fff}
.opt.bad{border-color:#ef4444;background:#fef2f2}.opt.bad .lb{background:#ef4444;color:#fff}
.opt.reveal{border-color:#22c55e;background:#f0fdf4}.opt.reveal .lb{background:#22c55e;color:#fff}
.opt.fade{opacity:.45}

/* Feedback */
.fb{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.fb.show{display:block}
.fb.good{background:#f0fdf4;color:#166534}
.fb.bad{background:#fef2f2;color:#991b1b}
.fb .fbl{font-weight:600;margin-bottom:4px}
.fb .fbmod{font-size:11px;color:#7e22ce;margin-top:6px}
.retry{display:inline-block;margin-top:8px;font-size:12px;color:#3b82f6;cursor:pointer}

/* Cut */
.cut{position:absolute;top:10px;right:10px;font-size:11px;padding:3px 10px;border:1px solid #f59e0b;background:#fff;color:#f59e0b;border-radius:12px;cursor:pointer;z-index:2;margin-left:20px}.qcard{padding-right:55px}
.cut.on{background:#f59e0b;color:#fff}

/* Bottom */
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:10px 16px;display:flex;align-items:center;z-index:20;gap:10px}
.bottom .btn{flex:1;padding:12px;border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:10px;font-size:14px;cursor:pointer;text-align:center}
.bottom .btn:active{background:#f3f4f6}
.bottom .btn.primary{background:#111;color:#fff;border-color:#111}
.bottom .pos{font-size:13px;color:#9ca3af;text-align:center;min-width:60px}

/* Drawer */
.drawer{position:fixed;top:0;right:-300px;width:280px;height:100%;background:#fff;z-index:200;transition:right .3s;box-shadow:-2px 0 12px rgba(0,0,0,.1);overflow-y:auto;padding:20px}
.drawer.open{right:0}
.drawer h3{font-size:15px;margin-bottom:14px}
.drawer .item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.drawer .item button{font-size:11px;padding:3px 10px;border:1px solid #22c55e;background:#fff;color:#22c55e;border-radius:10px;cursor:pointer}
.mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199}
.mask.show{display:block}
.gear{position:fixed;bottom:80px;right:16px;width:38px;height:38px;border-radius:50%;background:#fff;border:1px solid #e5e7eb;font-size:18px;cursor:pointer;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal .box{background:#fff;border-radius:14px;padding:24px;max-width:320px;width:92%}
.modal .box h3{margin-bottom:14px;font-size:16px}
.modal .box label{font-size:13px;color:#666;display:block;margin-top:8px}
.modal .box select,.modal .box input{width:100%;padding:10px;margin:4px 0 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;background:#f9fafb}
.modal .box .btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.modal .box .btns button{padding:10px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.modal .box .b-cancel{background:#f3f4f6;color:#374151}
.modal .box .b-ok{background:#111;color:#fff}

/* Exam result */
.exam-rst{display:none;text-align:center;padding:40px 20px;max-width:500px;margin:0 auto}
.exam-rst.show{display:block}
.exam-rst h2{font-size:22px;margin-bottom:8px}
.exam-rst .big{font-size:56px;font-weight:700;color:#111}
.exam-rst .big span{font-size:22px;color:#999;font-weight:400}
.exam-rst .info{margin:16px 0;font-size:14px;color:#666;line-height:1.8}
.exam-rst .wrongs{text-align:left;margin-top:20px;font-size:13px}
.exam-rst .wrongs div{margin:6px 0;line-height:1.5}
</style>
</head>
<body style="overflow:hidden">

<!-- AUTH OVERLAY -->
<div id="authOverlay" style="position:fixed;inset:0;background:#f8f9fa;z-index:999;display:flex;align-items:center;justify-content:center;padding:20px">
<div style="width:100%;max-width:340px">
  <div style="text-align:center;margin-bottom:30px">
    <div style="font-size:40px;margin-bottom:8px">🔐</div>
    <h2 style="font-size:18px;font-weight:700">信息流广告营销师题库</h2>
    <p style="font-size:12px;color:#999;margin-top:4px" id="authTitle">登录或注册进入</p>
  </div>
  <!-- Tabs -->
  <div style="display:flex;gap:0;margin-bottom:20px">
    <button id="tabLogin" style="flex:1;padding:10px;border:none;background:#212529;color:#fff;border-radius:8px 0 0 8px;font-size:14px;cursor:pointer" onclick="switchAuthTab('login')">登录</button>
    <button id="tabRegister" style="flex:1;padding:10px;border:none;background:#e5e7eb;color:#666;border-radius:0 8px 8px 0;font-size:14px;cursor:pointer" onclick="switchAuthTab('register')">注册</button>
  </div>
  <!-- Login Form -->
  <div id="formLogin">
    <input id="loginKey" placeholder="输入你的密钥" style="width:100%;padding:14px;border:1px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:12px">
    <button onclick="doLogin()" style="width:100%;padding:14px;background:#212529;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer">进入</button>
    <p id="loginError" style="font-size:12px;color:#ef4444;margin-top:8px;display:none"></p>
  </div>
  <!-- Register Form -->
  <div id="formRegister" style="display:none">
    <input id="regCode" placeholder="输入邀请码" style="width:100%;padding:14px;border:1px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:12px">
    <input id="regKey" placeholder="设置你的密钥（登录用）" style="width:100%;padding:14px;border:1px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:12px">
    <button onclick="doRegister()" style="width:100%;padding:14px;background:#7e22ce;color:#fff;border:none;border-radius:10px;font-size:15px;cursor:pointer">注册</button>
    <p id="regError" style="font-size:12px;color:#ef4444;margin-top:8px;display:none"></p>
  </div>
  <p style="text-align:center;font-size:11px;color:#ccc;margin-top:20px" id="existingUsers"></p>
</div></div>

<div id="appContent" style="display:none">

<div class="topbar">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
    <a class="home" href="index.html">← 首页</a>
    <h1 id="t">题库</h1>
    <span style="width:40px;font-size:11px;color:#1976d2;cursor:pointer" id="userLabel" onclick="switchUser()"></span>
  </div>
  <div class="row">
    <span>进度 <b id="an">0</b>/<b id="tn">0</b></span>
    <span style="color:#22c55e">✓ <b id="cc">0</b></span>
    <span style="color:#ef4444">✗ <b id="wc">0</b></span>
    <span style="color:#f59e0b">斩 <b id="cutc">0</b></span>
  </div>
</div>

<div class="modes" id="modes">
  <button data-mode="sequential" class="on">顺序</button>
  <button data-mode="random">随机</button>
  <button data-mode="wrong">错题</button>
  <button data-mode="exam" class="exam">模拟考试</button>
</div>

<div class="subbar">
  <div class="filter">
    <button data-filter="all" class="on">全部</button>
    <button data-filter="unanswered">未答</button>
    <button data-filter="wrong">答错</button>
    <button data-filter="high-error">易错</button>
  </div>
  <div class="actions">
    <span class="danger" id="clearBtn">清空</span>
  </div>
</div>

<div class="exam-status" id="examBar">
  模拟考试 · <b id="examTotal">0</b>题 · 满分<b id="examMax">0</b> · 剩余<b id="examRemain">0</b>
  <span style="margin-left:8px;color:#d97706;font-weight:600;cursor:pointer" id="submitExam">交卷</span>
</div>

<div class="main" id="main"></div>
<div class="exam-rst" id="examResult"></div>

<div class="bottom" id="bottomNav">
  <button class="btn" id="prevBtn">← 上一题</button>
  <span class="pos" id="pi" onclick="openQNav()" style="cursor:pointer;font-size:13px;color:#1976d2;text-decoration:underline">1/1 ▾</span>
  <button class="btn primary" id="nextBtn">下一题 →</button>
</div>

<div class="gear" id="settingsBtn">⚙</div>
<div class="mask" id="mask"></div>
<div class="drawer" id="drawer">
  <h3>已斩题目</h3>
  <div id="cutList"></div>
  <button style="margin-top:14px;width:100%;padding:10px;background:#ef4444;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer" id="restoreAll">恢复全部</button>
</div>

<!-- Countdown badge -->
<div id="cdBadge" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);color:#fff;font-size:48px;width:80px;height:80px;border-radius:50%;z-index:300;align-items:center;justify-content:center;font-weight:700;pointer-events:none"></div>

<!-- QNav -->
<div class="modal" id="qnavModal" style="z-index:250">
<div class="box" style="max-width:380px;max-height:80vh;overflow-y:auto">
<h3 style="font-size:14px">选择题目</h3>
<div id="qnavGrid" style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;margin:8px 0"></div>
<button class="b-cancel" style="width:100%;padding:8px;border:none;border-radius:6px;background:#eee;cursor:pointer;margin-top:8px" onclick="closeQNav()">关闭</button>
</div>
</div>

<div class="modal" id="examModal">
  <div class="box">
    <h3>模拟考试</h3>
    <label>题目数量</label>
    <select id="examQCount"><option value="50">50 题</option><option value="100" selected>100 题</option><option value="150">150 题</option><option value="0">全部</option></select>
    <label>时间（分钟，0=不限）</label>
    <input type="number" id="examTime" value="0" min="0">
    <div class="btns">
      <button class="b-cancel" onclick="closeExamModal()">取消</button>
      <button class="b-ok" onclick="startExam()">开始</button>
    </div>
  </div>
</div>

<script>
var QUESTIONS = [{"q": 1, "text": "第一次见客户，认真整理材料、正式着装，是利用了“投射效应”来获取客户认同。", "options": [{"label": "A", "text": "对"}, {"label": "B", "text": "错"}], "answer": "B", "explanation": "", "type": "tf", "module": "08 职业素养", "moduleId": 8}, {"q": 2, "text": "在广告监测中，检测链接或监测系统出问题有可能导致广告转化成本偏高", "options": [{"label": "A", "text": "对"}, {"label": "B", "text": "错"}], "answer": "A", "explanation": "", "type": "tf", "module": "07 数据分析", "moduleId": 7}, {"q": 3, "text": "CPM的含义是：", "options": [{"label": "A", "text": "广告点击一千次所需要的展示"}, {"label": "B", "text": "广告展示一千次所需要的成本"}, {"label": "C", "text": "广告下载一千次所需要的点击"}, {"label": "D", "text": "以上都错误"}], "answer": "B", "explanation": "", "type": "single", "module": "07 数据分析", "moduleId": 7}, {"q": 4, "text": "下列关于计费方式，描述错误的是：", "options": [{"label": "A", "text": "CPC：每次点击价格=下一位eCPM/预估CTR"}, {"label": "B", "text": "oCPM：每千次展示扣费=下一位eCPM+0.01"}, {"label": "C", "text": "PA：每转化扣费=下一位eCPM/(预估CTR*预估CVR）+0.01"}, {"label": "D", "text": "CPV：每次播放价格=下一位eCPM/预估播放率+0.01"}], "answer": "A", "explanation": "", "type": "single", "module": "07 数据分析", "moduleId": 7}, {"q": 5, "text": "关于团队历史合作客户部分的呈现，下列说法错误的是：", "options": [{"label": "A", "text": "重点列举广告主所在行业的客户合作情况"}, {"label": "B", "text": "重点列举广告主所在行业TOP客户/主要竞对"}, {"label": "C", "text": "重点呈现出历史合作客户的数量，行业不限，越多越好"}, {"label": "D", "text": "重点呈现出跟客户的合作年限、合作业务额、客户满意度"}], "answer": "C", "explanation": "", "type": "single", "module": "05 客户营销与提案", "moduleId": 5}, {"q": 6, "text": "在工作沟通中，下列属于高效倾听关键点的是：", "options": [{"label": "A", "text": "减少提问"}, {"label": "B", "text": "积极回应"}, {"label": "C", "text": "共同探讨"}, {"label": "D", "text": "客户至上"}], "answer": "B", "explanation": "", "type": "single", "module": "08 职业素养", "moduleId": 8}, {"q": 7, "text": "开始着手进行对客户的梳理，下列属于客户行业现状梳理维度的是", "options": [{"label": "A", "text": "竞争格局"}, {"label": "B", "text": "市场结构"}, {"label": "C", "text": "商业模式"}, {"label": "D", "text": "用户规模"}], "answer": "C", "explanation": "", "type": "single", "module": "05 客户营销与提案", "moduleId": 5}, {"q": 8, "text": "下列关于数据指标漏斗模型中落地页类的转化漏斗，表述正确的是：", "options": [{"label": "A", "text": "展示——落地页访问——落地页内转化——线索转化"}, {"label": "B", "text": "展示——点击—落地页内转化——落地页访问————线索转化"}, {"label": "C", "text": "展示——点击——落地页访问——线索转化——落地页内转化"}, {"label": "D", "text": "展示——点击——落地页访问——落地页内转化——线索转化"}], "answer": "D", "explanation": "", "type": "single", "module": "04 深度转化与线索", "moduleId": 4}, {"q": 9, "text": "以下关于头条第三方监测的点击监测，说法错误的是", "options": [{"label": "A", "text": "同步监测时是用户的客户端发送数据"}, {"label": "B", "text": "同步监测时，用户可以明显感知到落地页跳转"}, {"label": "C", "text": "如果监测链接是同步监测链接必须确保可以访问，因为涉及到用户被带到哪里"}, {"label": "D", "text": "点击监测只支持同步监测"}], "answer": "D", "explanation": "", "type": "single", "module": "03 账户搭建与创意", "moduleId": 3}, {"q": 10, "text": "每组程序化落地页最多支持多少个落地页？", "options": [{"label": "A", "text": "10"}, {"label": "B", "text": "12"}, {"label": "C", "text": "15"}, {"label": "D", "text": "20"}], "answer": "A", "explanation": "", "type": "single", "module": "03 账户搭建与创意", "moduleId": 3}, {"q": 11, "text": "下列不属于今日头条投放管理平台中定向方式的是：", "options": [{"label": "A", "text": "地域定向"}, {"label": "B", "text": "兴趣定向"}, {"label": "C", "text": "手机品牌定向"}, {"label": "D", "text": "婚姻状况定向"}], "answer": "D", "explanation": "", "type": "single", "module": "02 投放工具与产品", "moduleId": 2}, {"q": 12, "text": "通常情况下，广告能否获得展示是有ecpm决定的，影响ecpm的两个因素是", "options": [{"label": "A", "text": "出价、竞价环境"}, {"label": "B", "text": "广告质量度、人群定向"}, {"label": "C", "text": "广告投放位置广告质量度"}, {"label": "D", "text": "出价、广告质量度"}], "answer": "D", "explanation": "", "type": "single", "module": "02 投放工具与产品", "moduleId": 2}, {"q": 13, "text": "某广告主想在头条推广产品时，直接唤起电话进行购买，它需要创建哪种目的的推广", "options": [{"label": "A", "text": "应用下载"}, {"label": "B", "text": "落地页"}, {"label": "C", "text": "文章推广"}, {"label": "D", "text": "以上选择都可以"}], "answer": "B", "explanation": "", "type": "single", "module": "03 账户搭建与创意", "moduleId": 3}, {"q": 14, "text": "下列广告位中，可以选择“头条文章”为推广目的的是：", "options": [{"label": "A", "text": "今日头条"}, {"label": "B", "text": "抖音短视频"}, {"label": " function allQs(){ return QUESTIONS.slice(); }

function filterQs(){
  var qs = allQs();
  if(S.mode!=='exam') qs=qs.filter(function(q){return S.cut.indexOf(q.q)===-1});
  if(S.mode==='wrong'){qs=qs.filter(function(q){return S.errCount[q.q]>0});qs.sort(function(a,b){return(S.errCount[b.q]||0)-(S.errCount[a.q]||0)})}
  if(S.filter==='unanswered') qs=qs.filter(function(q){return !S.answers[q.q]});
  else if(S.filter==='wrong') qs=qs.filter(function(q){return S.answers[q.q]&&!S.answers[q.q].correct});
  else if(S.filter==='high-error'){qs=qs.filter(function(q){return(S.errCount[q.q]||0)>=3});qs.sort(function(a,b){return(S.errCount[b.q]||0)-(S.errCount[a.q]||0)})}
  if(S.mode==='random'){
    if(S.rand.length!==qs.length) S.rand=shuffle(qs.map(function(_,i){return i}));
    var o=[];for(var i=0;i<S.rand.length;i++){if(S.rand[i]<qs.length)o.push(qs[S.rand[i]])}qs=o;
  }
  return qs;
}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}return b}

function stats(){
  var all=allQs(),act=filterQs();
  var ad=0,ok=0,ng=0;
  Object.keys(S.answers).forEach(function(k){if(S.answers[k]){ad++;if(S.answers[k].correct)ok++;else ng++}});
  return {total:act.length,allTotal:all.length,answered:ad,correct:ok,wrong:ng,cutCount:S.cut.length};
}

function curQ(){
  var qs=filterQs();if(qs.length===0)return null;
  if(S.idx>=qs.length)S.idx=qs.length-1;if(S.idx<0)S.idx=0;return qs[S.idx];
}

function renderQ(){
  var q=curQ(),qs=filterQs(),main=document.getElementById('main'),pi=document.getElementById('pi');
  if(qs.length===0){main.innerHTML='<div style=\"text-align:center;padding:80px 20px;color:#aaa\">无题目</div>';pi.textContent='0/0';return}
  pi.textContent=(S.idx+1)+'/'+qs.length;
  var ans=(S.mode==='exam')?S.examAns[q.q]:S.answers[q.q],answered=!!ans,isCut=S.cut.indexOf(q.q)!==-1;
  var h='<div class=\"qcard'+(answered?(ans.correct?' answered':' failed'):'')+'\">';
  h+='<button class=\"cut'+(isCut?' on':'')+'\" data-q=\"'+q.q+'\">'+(isCut?'已斩':'斩')+'</button>';

  h+='</div><div class=\"options\">';
  q.options.forEach(function(o){

  });
  h+='</div>';
  if(answered){
    h+='<div class=\"fb show '+(ans.correct?'good':'bad')+'\"><div class=\"fbl\">'+(ans.correct?'✓ 回答正确':'✗ 回答错误')+'</div>';

function bindEvts(){
  document.querySelectorAll('.opt.sel').forEach(function(el){el.addEventListener('click',function(){
    var n=parseInt(el.dataset.q),l=el.dataset.label,q=findQ(n);if(!q)return;
    var ok=(l===q.answer);
    if(S.mode==='exam'){S.examAns[n]={selected:l,correct:ok,time:Date.now()}}
    else{S.answers[n]={selected:l,correct:ok,time:Date.now()};if(ok){S.okCount[n]=(S.okCount[n]||0)+1}else{S.errCount[n]=(S.errCount[n]||0)+1}}
    renderAll();
    if(ok){startCountdown()}else{cancelCountdown()}
  })});
  document.querySelectorAll('.cut').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var n=parseInt(el.dataset.q),i=S.cut.indexOf(n);if(i===-1){S.cut.push(n);delete S.errCount[n]}else{S.cut.splice(i,1)};renderAll()})});
  document.querySelectorAll('.retry').forEach(function(el){el.addEventListener('click',function(e){e.stopPropagation();var n=parseInt(el.dataset.q);if(S.mode==='exam')delete S.examAns[n];else delete S.answers[n];renderAll()})});
}

document.getElementById('prevBtn').addEventListener('click',function(){cancelCountdown();if(S.idx>0){S.idx--;renderAll()}});
document.getElementById('nextBtn').addEventListener('click',function(){cancelCountdown();var qs=filterQs();if(S.idx<qs.length-1){S.idx++;renderAll()}});
function startCountdown(){
  cancelCountdown();
  var cd=document.getElementById('cdBadge'),n=3;
  cd.style.display='flex';cd.textContent=n;
  function tick(){
    n--;if(n<=0){cd.style.display='none';cd.textContent='';var qs=filterQs();if(S.idx<qs.length-1){S.idx++;renderAll()};COUNTDOWN=null}
    else{cd.textContent=n;COUNTDOWN=setTimeout(tick,1000)}
  }
  COUNTDOWN=setTimeout(tick,1000);
}
function cancelCountdown(){
  if(COUNTDOWN){clearTimeout(COUNTDOWN);COUNTDOWN=null}
  var cd=document.getElementById('cdBadge');cd.style.display='none';cd.textContent='';
}

document.querySelectorAll('#modes button').forEach(function(b){b.addEventListener('click',function(){
  var m=b.dataset.mode;if(m==='exam'){document.getElementById('examModal').classList.add('show');return}
  S.mode=m;S.idx=0;S.filter=(m==='wrong')?'all':S.filter;renderAll()
})});

document.querySelectorAll('.subbar .filter button').forEach(function(b){b.addEventListener('click',function(){S.filter=b.dataset.filter;S.idx=0;renderAll()})});
document.getElementById('clearBtn').addEventListener('click',function(){if(confirm('清空答题历史？（错题和斩题永久保留）')){S.answers={};S.okCount={};save();renderAll()}});

document.getElementById('settingsBtn').addEventListener('click',function(){document.getElementById('drawer').classList.add('open');document.getElementById('mask').classList.add('show');renderCutList()});
document.getElementById('mask').addEventListener('click',function(){document.getElementById('drawer').classList.remove('open');document.getElementById('mask').classList.remove('show')});

function renderCutList(){
  var h='';if(S.cut.length===0)h='<div style=\"color:#aaa;font-size:13px\">暂无</div>';
  else S.cut.forEach(function(n){var q=findQ(n);h+='<div class=\"item\"><span>'+n+'. '+esc(q?q.text.substring(0,24):'')+'</span><button data-q=\"'+n+'\">恢复</button></div>'});
  document.getElementById('cutList').innerHTML=h;
  document.querySelectorAll('#cutList button').forEach(function(b){b.addEventListener('click',function(){var i=S.cut.indexOf(parseInt(b.dataset.q));if(i!==-1)S.cut.splice(i,1);renderCutList();renderAll()})});
}
document.getElementById('restoreAll').addEventListener('click',function(){S.cut=[];renderCutList();renderAll()});
document.getElementById('submitExam').addEventListener('click',function(){if(confirm('交卷？'))finishExam()});

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();cancelCountdown();if(S.idx>0){S.idx--;renderAll()}}
  else if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();cancelCountdown();var qs=filterQs();if(S.idx<qs.length-1){S.idx++;renderAll()}}
});

var tx=0,ty=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY});
document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){cancelCountdown();var qs=filterQs();if(dx<0&&S.idx<qs.length-1){S.idx++;renderAll()}else if(dx>0&&S.idx>0){S.idx--;renderAll()}}});

function openQNav(){
  var qs=filterQs(),g=document.getElementById('qnavGrid'),h='';
  for(var i=0;i<qs.length;i++){
    var q=qs[i],ans=S.answers[q.q],cls='background:#e5e7eb;color:#666';
    if(ans){cls=ans.correct?'background:#d1fae5;color:#059669':'background:#fee2e2;color:#dc2626'}
    if(S.cut.indexOf(q.q)!==-1) cls='background:#fef3c7;color:#d97706';
    if(i===S.idx) cls='border:2px solid #1976d2';
    h+='<div style=\"padding:6px 2px;text-align:center;font-size:11px;border-radius:4px;cursor:pointer;'+cls+'\" onclick=\"S.idx='+i+';renderAll();closeQNav()\">'+(i+1)+'</div>';
  }
  g.innerHTML=h;document.getElementById('qnavModal').classList.add('show');
}
function closeQNav(){document.getElementById('qnavModal').classList.remove('show')}
function closeExamModal(){document.getElementById('examModal').classList.remove('show')}
function startExam(){
  var total=parseInt(document.getElementById('examQCount').value)||0,tl=parseInt(document.getElementById('examTime').value)||0;closeExamModal();
  var a=allQs(),ss=a.filter(function(q){return q.type==='single'}),ms=a.filter(function(q){return q.type==='multi'}),ts=a.filter(function(q){return q.type==='tf'});
  var t=total||a.length,ns=Math.min(Math.round(t*.6),ss.length),nm=Math.min(Math.round(t*.3),ms.length),nt=Math.min(t-ns-nm,ts.length);
  var eq=[];eq=eq.concat(shuffle(ss).slice(0,ns));eq=eq.concat(shuffle(ms).slice(0,nm));eq=eq.concat(shuffle(ts).slice(0,nt));eq=shuffle(eq);
  S.mode='exam';S.examQs=eq;S.examAns={};S.examStart=Date.now();S.idx=0;S.filter='all';
  document.getElementById('examTotal').textContent=eq.length;document.getElementById('examMax').textContent=calcMax();
  if(tl>0&&S.examTimer)clearInterval(S.examTimer);
  if(tl>0){var et=Date.now()+tl*60000;S.examTimer=setInterval(function(){var r=Math.max(0,Math.ceil((et-Date.now())/1000));var m=Math.floor(r/60),s=r%60;document.getElementById('examRemain').textContent=m+':'+(s<10?'0':'')+s;if(r<=0)finishExam()},1000);document.getElementById('examRemain').textContent=tl+':00'}else{document.getElementById('examRemain').textContent=eq.length}
  renderAll();
}
function calcMax(){var t=0;S.examQs.forEach(function(q){t+=(q.type==='multi'?2:1)});return t}
function finishExam(){
  if(S.examTimer)clearInterval(S.examTimer);var cor=0,wro=0,sco=0,wqs=[];
  S.examQs.forEach(function(q){var a=S.examAns[q.q];if(!a)return;if(a.correct){cor++;sco+=(q.type==='multi'?2:1)}else{wro++;wqs.push(q);S.errCount[q.q]=(S.errCount[q.q]||0)+1;S.answers[q.q]=a}});
  var max=calcMax(),pct=max>0?Math.round(sco/max*100):0;
  S.examHist.push({date:new Date().toISOString(),score:sco,maxScore:max,correct:cor,wrong:wro,pct:pct});
  var m=document.getElementById('main'),r=document.getElementById('examResult'),h='<h2>'+(pct>=60?'🎉 通过':'💪 继续加油')+'</h2>';
  h+='<div class=\"big\">'+sco+'<span>/'+max+'</span></div>';
  h+='<div class=\"info\">正确率 '+pct+'% · 对 '+cor+' · 错 '+wro+'</div>';
  if(wqs.length>0){h+='<div class=\"wrongs\"><b>错题：</b>';wqs.forEach(function(q){var a=S.examAns[q.q];h+='<div>'+q.q+'. '+esc(q.text.substring(0,50))+' <span style=\"color:#ef4444\">(选:'+(a?a.selected:'未答')+' 对:'+q.answer+')</span></div>'});h+='</div>'}
  h+='<button style=\"margin-top:20px;padding:12px 28px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer\" onclick=\"exitExam()\">返回练习</button>';
  m.innerHTML='';r.innerHTML=h;r.classList.add('show');document.getElementById('bottomNav').style.display='none';document.getElementById('examBar').classList.remove('show');save();
}
function exitExam(){S.mode='sequential';S.examQs=[];S.examAns={};if(S.examTimer)clearInterval(S.examTimer);document.getElementById('examResult').classList.remove('show');document.getElementById('examResult').innerHTML='';document.getElementById('bottomNav').style.display='flex';S.idx=0;renderAll()}

document.getElementById('t').textContent=QUIZ_TITLE;
function listExistingUsers(){
  var keys=[];
  try{ for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);var m=k.match(new RegExp('^qz_'+QUIZ_ID+'_(.+)$'));if(m)keys.push(m[1])} }catch(e){}
  var el=document.getElementById('existingUsers');
  el.textContent=keys.length>0?'已有用户：'+keys.join('、'):'';
}
listExistingUsers();
document.getElementById('loginKey').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
document.getElementById('regCode').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister()});
document.getElementById('regKey').addEventListener('keydown',function(e){if(e.key==='Enter')doRegister()});
document.getElementById('loginKey').focus();
</script>
