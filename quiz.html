<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>题库练习</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333;min-height:100vh;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 12px}
.header h1{font-size:14px;text-align:center;color:#666;margin-bottom:6px}
.stats{display:flex;justify-content:space-around;font-size:12px;margin-bottom:6px}
.stats span{font-weight:600}.stats .c{color:#4caf50}.stats .w{color:#f44336}
.pbar{height:3px;background:#e0e0e0;border-radius:2px;overflow:hidden}.pbar-fill{height:100%;background:#1976d2;transition:width .3s}
/* Modes */
.modes{display:flex;gap:4px;padding:6px 12px;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:72px;z-index:9;overflow-x:auto}
.modes button{flex-shrink:0;padding:6px 12px;border:1px solid #ddd;background:#fff;border-radius:14px;font-size:12px;cursor:pointer;white-space:nowrap}
.modes button.active{background:#1976d2;color:#fff;border-color:#1976d2}
.modes button.exam-mode{background:#ff9800;color:#fff;border-color:#ff9800}
.modes button.exam-mode.active{background:#e65100}
/* Exam bar */
.exam-bar{display:none;padding:6px 12px;background:#fff3e0;border-bottom:1px solid #ffe0b2;font-size:12px;text-align:center;position:sticky;top:116px;z-index:8}
.exam-bar.show{display:block}
.exam-bar b{color:#e65100}
/* Filter */
.filter{display:flex;gap:4px;padding:6px 12px;background:#fff;border-bottom:1px solid #e0e0e0;overflow-x:auto;position:sticky;top:140px;z-index:7}
.filter button{flex-shrink:0;padding:4px 10px;border:1px solid #ddd;background:#fff;border-radius:12px;font-size:11px;cursor:pointer}
.filter button.active{background:#1976d2;color:#fff;border-color:#1976d2}
.main{padding:8px 8px 100px}
.qcard{background:#fff;border-radius:10px;padding:14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);position:relative}
.qcard.cut{border-left:3px solid #ff9800;opacity:.6}
.qcard.correct{border-left:3px solid #4caf50}.qcard.wrong{border-left:3px solid #f44336}
.qheader{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.qnum{font-size:13px;font-weight:700;color:#1976d2}
.qbadges{display:flex;gap:4px;font-size:10px}
.qbadges span{padding:1px 6px;border-radius:8px}
.qtype{background:#e3f2fd;color:#1976d2}
.qmodule{background:#f3e5f5;color:#7b1fa2}
.qtext{font-size:14px;line-height:1.6;margin-bottom:10px;color:#222}
.options{display:flex;flex-direction:column;gap:6px}
.option{display:flex;align-items:flex-start;padding:10px 12px;border:2px solid #e8e8e8;border-radius:8px;cursor:pointer;transition:all .1s;font-size:13px;line-height:1.5}
.option:active{transform:scale(.98)}
.option .label{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;margin-right:8px;color:#666}
.option.correct{border-color:#4caf50;background:#e8f5e9}.option.correct .label{background:#4caf50;color:#fff}
.option.wrong{border-color:#f44336;background:#ffebee}.option.wrong .label{background:#f44336;color:#fff}
.option.reveal{border-color:#4caf50;background:#f1f8e9}.option.reveal .label{background:#4caf50;color:#fff}
.option.dim{opacity:.5}
.feedback{margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.ok{background:#e8f5e9;color:#2e7d32}
.feedback.no{background:#ffebee;color:#c62828}
.feedback .fb-label{font-weight:700;margin-bottom:4px}
.feedback .fb-module{font-size:11px;color:#7b1fa2;margin-top:4px}
.cut-btn{position:absolute;top:8px;right:8px;font-size:11px;padding:4px 8px;border:1px solid #ff9800;background:#fff;color:#ff9800;border-radius:10px;cursor:pointer;z-index:2}
.cut-btn.cut{background:#ff9800;color:#fff}
.retry-btn{margin-top:6px;padding:4px 12px;background:#1976d2;color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer}
/* Bottom */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;z-index:10;gap:8px}
.bottom-nav button{flex:1;padding:8px;border:1px solid #1976d2;background:#fff;color:#1976d2;border-radius:6px;font-size:13px;cursor:pointer}
.bottom-nav button:active{opacity:.7}
.bottom-nav button.primary{background:#1976d2;color:#fff}
.bottom-nav .pi{font-size:12px;color:#999;text-align:center;min-width:60px}
/* Settings drawer */
.drawer{position:fixed;top:0;right:-300px;width:280px;height:100%;background:#fff;z-index:100;transition:right .3s;box-shadow:-2px 0 8px rgba(0,0,0,.2);overflow-y:auto;padding:16px}
.drawer.open{right:0}
.drawer h3{font-size:15px;margin-bottom:12px}
.drawer .cut-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #eee;font-size:13px}
.drawer .restore-btn{font-size:11px;padding:2px 8px;border:1px solid #4caf50;background:#fff;color:#4caf50;border-radius:8px;cursor:pointer}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:99}
.overlay.show{display:block}
.settings-btn{position:fixed;bottom:70px;right:12px;width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #ddd;font-size:18px;cursor:pointer;z-index:50;box-shadow:0 2px 4px rgba(0,0,0,.2)}
/* Exam result */
.exam-result{text-align:center;padding:40px 20px;display:none}
.exam-result.show{display:block}
.exam-result h2{font-size:24px;margin-bottom:8px}
.exam-result .score{font-size:48px;font-weight:700;color:#1976d2}
.exam-result .detail{margin-top:16px;font-size:14px;color:#666}
.exam-result .wrong-list{text-align:left;margin-top:16px;font-size:13px}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:24px;max-width:320px;width:90%}
.modal-box h3{margin-bottom:12px}
.modal-box input,.modal-box select{width:100%;padding:8px;margin:6px 0;border:1px solid #ddd;border-radius:6px;font-size:14px}
.modal-box button{padding:10px 20px;margin:6px 4px;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.modal-box .btn-primary{background:#1976d2;color:#fff}.modal-box .btn-cancel{background:#eee;color:#333}
/* Home button */
.home-btn{font-size:11px;padding:4px 8px;border:1px solid #999;background:#fff;color:#999;border-radius:8px;cursor:pointer;text-decoration:none}
@media(min-width:768px){.main{max-width:720px;margin:0 auto}}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <a class="home-btn" href="index.html">← 首页</a>
    <h1 id="quizTitle">题库练习</h1>
    <span style="width:40px"></span>
  </div>
  <div class="stats">
    <span>已答 <b id="an">0</b>/<b id="tn">0</b></span>
    <span class="c">✓ <b id="cc">0</b></span>
    <span class="w">✗ <b id="wc">0</b></span>
    <span style="color:#ff9800">斩 <b id="cutc">0</b></span>
  </div>
  <div class="pbar"><div class="pbar-fill" id="pf" style="width:0%"></div></div>
</div>

<div class="modes" id="modes">
  <button data-mode="sequential" class="active">顺序练习</button>
  <button data-mode="random">随机练习</button>
  <button data-mode="wrong">错题库</button>
  <button data-mode="exam" class="exam-mode">模拟考试</button>
</div>

<div class="exam-bar" id="examBar">
  <b>模拟考试</b> · 单选60% 多选30% 判断10% · 共 <b id="examTotal">0</b> 题 · 满分 <b id="examMax">0</b> 分 · 剩余 <b id="examRemain">0</b> 题
  <button style="margin-left:8px;font-size:11px;padding:2px 8px;background:#e65100;color:#fff;border:none;border-radius:4px;cursor:pointer" id="submitExam">交卷</button>
</div>

<div class="filter">
  <button class="active" data-filter="all">全部</button>
  <button data-filter="unanswered">未答</button>
  <button data-filter="wrong">错题</button>
  <button data-filter="answered">已答</button>
  <button data-filter="high-error">高频易错</button>
  <button id="clearBtn" style="color:#f44336;border-color:#f44336">清空进度</button>
</div>

<div class="main" id="main"></div>
<div class="exam-result" id="examResult"></div>

<div class="bottom-nav" id="bottomNav">
  <button id="prevBtn">← 上一题</button>
  <span class="pi" id="pi">1/1</span>
  <button id="nextBtn" class="primary">下一题 →</button>
</div>

<button class="settings-btn" id="settingsBtn">⚙</button>
<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <h3>⚙ 已斩题目</h3>
  <div id="cutList"></div>
  <button style="margin-top:12px;width:100%;padding:8px;background:#f44336;color:#fff;border:none;border-radius:6px;cursor:pointer" id="restoreAll">恢复全部</button>
</div>

<!-- Exam config modal -->
<div class="modal" id="examModal">
  <div class="modal-box">
    <h3>模拟考试设置</h3>
    <label>题目数量</label>
    <select id="examQCount"><option value="50">50题</option><option value="100" selected>100题</option><option value="150">150题</option><option value="0">全部</option></select>
    <label>时间限制（分钟，0=不限）</label>
    <input type="number" id="examTime" value="0" min="0">
    <div style="text-align:right;margin-top:12px">
      <button class="btn-cancel" onclick="closeExamModal()">取消</button>
      <button class="btn-primary" onclick="startExam()">开始考试</button>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
var QUESTIONS = [{"q": 1, "text": "以下关于巨量引擎工作台，描述错误的是", "options": [{"label": "A", "text": "可以通过巨量引擎工作台前往巨量广告平台"}, {"label": "B", "text": "可以在巨量引擎工作台进行多账户的管理"}, {"label": "C", "text": "可以在巨量引擎工作台新建广告"}, {"label": "D", "text": "可以在巨量引擎工作台同组织内共享视频素材"}], "answer": "C", "explanation": "C.可以在巨量引擎工作台新建广告", "type": "single", "module": "01 行业与平台基础", "moduleId": 1}, {"q": 2, "text": "下列哪个内容未在本课程的行业案例中提及到", "options": [{"label": "A", "text": "权限管理"}, {"label": "B", "text": "多资产共享"}, {"label": "C", "text": "多账户转账"}, {"label": "D", "text": "认证管理"}], "answer": "D", "explanation": "D、认证管理(正确答案)", "type": "single", "module": "03 账户搭建与创意", "moduleId": 3}, {"q": 3, "text": "关于“深度转化”，下列做法正确的是:", "options": [{"label": "A", "text": "因为觉得“首课到课”目标太浅，把第三节到课的人群传到“首课到课”深度事件上使用"}, {"label": "B", "text": "正价课转化周期需7天，使用深转后7天就查看深转数据，发现数据负向立马暂停深转"}, {"label": "C", "text": "使用行业模型深转的同时使用通用模型，两者叠加效果更好"}, {"label": "D", "text": "使用“星链”将后端深转数据加密回传，并在有数据量级大幅波动、长时间停投数据断传的情况提前告知"}], "answer": "D", "explanation": "D、使用“星链”将后端深转数据加密回传，并在有数据量级大幅波动、长时间停投数据断传的情况提前告知", "type": "single", "module": "04 深度转化与线索", "moduleId": 4}, {"q": 4, "text": "金融财富行业的主流链路是【微信客服加粉】，该链路的标准化投放目标是如下哪个", "options": [{"label": "A", "text": "微信复制"}, {"label": "B", "text": "微信内付费"}, {"label": "C", "text": "微信-添加企业微信"}, {"label": "D", "text": "表单提交"}], "answer": "C", "explanation": "C、微信-添加企业微信(正确答案)", "type": "single", "module": "04 深度转化与线索", "moduleId": 4}, {"q": 5, "text": "关于OCPM的计费逻辑以下正确的是", "options": [{"label": "A", "text": "按转化扣费"}, {"label": "B", "text": "按曝光扣费"}, {"label": "C", "text": "按点击扣费"}], "answer": "B", "explanation": "B、按曝光扣费", "type": "single", "module": "07 数据分析", "moduleId": 7}, {"q": 6, "text": "橙子建站落地页组件与转化目标的关系描述正确的是", "options": [{"label": "A", "text": "组件对应的转化目标会在创编计划时带出"}, {"label": "B", "text": "需要在事件管理添加转化目标"}, {"label": "C", "text": "橙子建站落地页包含多个组件，可以选择单一转化目标，如表单提交"}], "answer": "C", "explanation": "C、橙子建站落地页包含多个组件，可以选择单一转化目标，如表单提交", "type": "single", "module": "03 账户搭建与创意", "moduleId": 3}, {"q": 7, "text": "关于人群运算，下列说法正确的是", "options": [{"label": "A", "text": "人群运算只能对不同标签进行运算"}, {"label": "B", "text": "人群运算只可以算人群交集"}, {"label": "C", "text": "人群运算只可以算人群并集"}, {"label": "D", "text": "人群运算可以进行交、并、排除运算"}], "answer": "D", "explanation": "D、人群运算可以进行交、并、排除运算", "type": "single", "module": "01 行业与平台基础", "moduleId": 1}, {"q": 8, "text": "以下哪个维度不能用于视频分析-人群细分，查看相应叉乘组合的人群数据", "options": [{"label": "A", "text": "年龄"}, {"label": "B", "text": "城市级别"}, {"label": "C", "text": "性别"}, {"label": "D", "text": "消费水平"}], "answer": "D", "explanation": "D、消费水平", "type": "single", "module": "01 行业与平台基础", "moduleId": 1}, {"q": 9, "text": "以下关于Nobid（最大转化）描述不正确的是", "options": [{"label": "A", "text": "一般建议初始小预算"}, {"label": "B", "text": "成本符合预期时小幅度进行预算上调"}, {"label": "C", "text": "Nobid追求最低成本"}, {"label": "D", "text": "Nobid会贴合大盘/行业流量曲线做分时段的预算分配"}], "answer": "C", "explanation": "C、Nobid追求最低成本", "type": "single", "module": "02 投放工具与产品", "moduleId": 2}, {"q": 10, "text": "人群包每天可发布次数限制为", "options": [{"label": "A", "text": "1次"}, {"label": "B", "text": "10次"}, {"label": "C", "text": "50次"}, {"label": "D", "text": "无限制"}], "answer": "D", "explanation": "D、无限制", "type": "single", "module": "01 行业与平台基础", "moduleId": 1}, {"q": 11, "text": "以下关于线索直播自动投放（UBL）描述正确的是", "options": [{"label": "A", "text": "直播间未进行直播的时间段，即使在设置的投放时间内，也默认不会投放"}, {"label": "B", "text": "支持小风车组件"}, {"label": "C", "text": "不支持搜索广告"}, {"label": "D", "text": "以上均正确"}], "answer": "D", "explanation": "D、以上均正确(正确答案)", "type": "single", "module": "04 深度转化与线索", "moduleId": 4}, {"q": 12, "text": "客服加粉方案和落地页的对应关系是", "options": [{"label": "A", "text": "一对一"}, {"label": "B", "text": "一对多"}, {"label": "C", "text": "多对一"}, {"label": "D", "text": "不限"}], "answer": "B", "explanation": "B、一对多", "type": "single", "module": "04 深度转化与线索", "moduleId": 4}, {"q": 13, "text": "在对时间进行有效管理中，我们设置待办事项清单首先要做的事情是", "options": [{"label": "A", "text": "标明计划完成的时间"}, {"label": "B", "text": "合理排序"}, {"label": "C", "text": "补充相关事情"}, {"label": "D", "text": "写下来明显重要的事情"}], "answer": "D", "explanation": "D、写下来明显重要的事情", "type": "single", "module": "01 行业与平台基础", "moduleId": 1}, {"q": 14, "text": "优化师张明在维护客户关系上有自己的一套维护思路和技巧，以下他在客户关系维护中不恰当的是哪一项", "options": [{"label": "A", "text": "对于客户提出的每一个需求，充分了解客户的感受和想法，运用同理心，和客户先建立情感联结，再解决具体的问题，让客户有好的感受"}, {"label": "B", "text": "优化师的每一步行动，需要让客户感觉到用心与细致，向客户说出自己的想法，让客户知道我们是为他着想"}, {"label": "C", "text": "当接到客户的需求或者异议时，应负责到底，过程中如果出现交接，也需要对结果关注，及时回复客户事情的进度和效果"}, {"label": "D", "text": "当客户有异议时，应快速反应并做出调整，当效果达到预期后再与客户同步"}], "answer": "D", "explanation": "D、当客户有异议时，应快速反应并做出调整，当效果达到预期后再与客户同步", "type": "single", "module": "05 客户营销与提案", "moduleId": 5}, {"q": 15, "text": "穿山甲每次付费出价产品主要优化指标是什么", "options": [{"label": "A", "text": "付费成本"}, {"label": "B", "text": "变现ROI"}, {"label": "C", "text": "付费次数及ROI回收"}, {"label": "D", "text": "次留"}], "answer": "C", "explanation": "C、付费次数及ROI回收", "type": "single", "module": "07 数据分析", "moduleId": 7}, {"q": 16, "text": "磁贴类附加创意可配置的展示时间为", "options": [{"label": "A", "text": "3-5s"}, {"label": "B", "text": "5s之后"}, {"label": "C", "text": "10s及之后"}, {"label": "D", "text": "不限制时间"}], "answer": "C", "explanation": "C、10s及之后", "type": "single", "module": "01 行业与平台基础", "moduleId": 1}, {"q": 17, "text": "下列推广目的不能在广告投放平台实现的是", "options": [{"label": "A", "text": "落地页"}, {"label": "B", "text": "APP下载"}, {"label": "C", "text": "抖音号推广"}, {"label": "D", "text": "公众号"}], "answer": "D", "explanation": "D、公众号", "type": "single", "module": "03 账户搭建与创意", "moduleId": 3}, {"q": 18, "text": "巨量引擎【行为兴趣】定向，选择用户历史一段时间内发生的行为，不支持下列哪个时段", "options": [{"label": "A", "text": "7-15天"}, {"label": "B", "text": "15-90天"}, {"label": "C", "text": "180-365天"}, {"label": "D", "text": "999天"}], "answer": "D", "explanation": "D、999天", "type": "single", "module": "02 投放工具与产品", "moduleId": 2}, {"q": 19, "text": "关于投放【微信_用户首次消息】深度优化目标的回传要求，不正确的是", "options": [{"label": "A", "text": "日均回传数量大于100个"}, {"label": "B", "text": "回传有效率在5%-95%左右"}, {"label": "C", "text": "回传深度转化事件必须在获得转化事件后7天内完成"}, {"label": "D", "tex   mode: 'sequential',      // sequential | random | wrong | exam
  currentIndex: 0,
  filter: 'all',
  // Per-question tracking
  answers: {},       // {qNum: {selected, correct, time}}
  errorCount: {},     // {qNum: count}
  correctCount: {},   // {qNum: count}
  // Cut questions
  cutQuestions: [],    // [qNum, ...]
  // Random order (cached)
  randomOrder: [],
  // Exam
  examConfig: { total: 100, timeLimit: 0 },
  examQuestions: [],    // Question objects for current exam
  examAnswers: {},      // Answers during exam
  examStartTime: 0,
  examTimer: null,
  // History
  examHistory: []
};

// ===== PERSISTENCE =====
function loadState(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(raw){
      var s = JSON.parse(raw);
      STATE.mode = s.mode || 'sequential';
      STATE.answers = s.answers || {};
      STATE.errorCount = s.errorCount || {};
      STATE.correctCount = s.correctCount || {};
      STATE.cutQuestions = s.cutQuestions || [];
      STATE.examHistory = s.examHistory || [];
    }
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      mode: STATE.mode,
      answers: STATE.answers,
      errorCount: STATE.errorCount,
      correctCount: STATE.correctCount,
      cutQuestions: STATE.cutQuestions,
      examHistory: STATE.examHistory
    }));
  }catch(e){}
}
function clearState(){
  if(confirm('确定清空所有答题进度？包括错题记录和斩题。')){
    STATE.answers = {}; STATE.errorCount = {}; STATE.correctCount = {};
    STATE.cutQuestions = []; STATE.examHistory = [];
    saveState(); renderAll();
  }
}

// ===== QUESTION FILTERING =====
function getAllQuestions(){
  return QUESTIONS.slice();
}

function getActiveQuestions(){
  var qs = getAllQuestions();
  // In exam mode, use exam questions
  if(STATE.mode === 'exam'){
    return STATE.examQuestions;
  }
  // Filter cut questions (not in exam mode)
  if(STATE.mode !== 'exam'){
    qs = qs.filter(function(q){ return STATE.cutQuestions.indexOf(q.q) === -1; });
  }
  // Mode filtering
  if(STATE.mode === 'wrong'){
    qs = qs.filter(function(q){ return STATE.errorCount[q.q] > 0; });
    qs.sort(function(a,b){ return (STATE.errorCount[b.q]||0) - (STATE.errorCount[a.q]||0); });
  }
  // Filter
  if(STATE.filter === 'unanswered'){
    qs = qs.filter(function(q){ return !STATE.answers[q.q]; });
  }else if(STATE.filter === 'wrong'){
    qs = qs.filter(function(q){ return STATE.answers[q.q] && !STATE.answers[q.q].correct; });
  }else if(STATE.filter === 'answered'){
    qs = qs.filter(function(q){ return STATE.answers[q.q]; });
  }else if(STATE.filter === 'high-error'){
    qs = qs.filter(function(q){ return (STATE.errorCount[q.q]||0) >= 3; });
    qs.sort(function(a,b){ return (STATE.errorCount[b.q]||0) - (STATE.errorCount[a.q]||0); });
  }
  // Random order
  if(STATE.mode === 'random'){
    if(STATE.randomOrder.length !== qs.length){
      STATE.randomOrder = shuffle(qs.map(function(_,i){ return i; }));
    }
    var ordered = [];
    for(var i = 0; i < STATE.randomOrder.length; i++){
      if(STATE.randomOrder[i] < qs.length) ordered.push(qs[STATE.randomOrder[i]]);
    }
    qs = ordered;
  }
  return qs;
}

function shuffle(arr){
  var a = arr.slice();
  for(var i = a.length-1; i > 0; i--){
    var j = Math.floor(Math.random() * (i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

// ===== STATS =====
function getStats(){
  var all = getAllQuestions();
  var active = getActiveQuestions();
  var answered = 0, correct = 0, wrong = 0;
  Object.keys(STATE.answers).forEach(function(k){
    if(STATE.answers[k]){
      answered++;
      if(STATE.answers[k].correct) correct++; else wrong++;
    }
  });
  return {
    total: active.length,
    allTotal: all.length,
    answered: answered,
    correct: correct,
    wrong: wrong,
    cutCount: STATE.cutQuestions.length
  };
}

// ===== RENDER =====
function renderAll(){
  saveState();
  updateHeader();
  updateModes();
  updateExamBar();
  updateFilter();
  if(STATE.mode === 'exam' && STATE.examQuestions.length > 0){
    var rem = STATE.examQuestions.length - Object.keys(STATE.examAnswers).length;
    document.getElementById('examRemain').textContent = rem;
    if(rem === 0){
      finishExam();
      return;
    }
  }
  renderQuestion();
}

function updateHeader(){
  var s = getStats();
  if(STATE.mode === 'exam'){
    document.getElementById('an').textContent = Object.keys(STATE.examAnswers).length;
    document.getElementById('tn').textContent = STATE.examQuestions.length;
  }else{
    document.getElementById('an').textContent = s.answered;
    document.getElementById('tn').textContent = s.total;
  }
  document.getElementById('cc').textContent = s.correct;
  document.getElementById('wc').textContent = s.wrong;
  document.getElementById('cutc').textContent = s.cutCount;
  var pct = s.allTotal > 0 ? (s.answered / s.allTotal * 100) : 0;
  document.getElementById('pf').style.width = pct + '%';
}

function updateModes(){
  document.querySelectorAll('#modes button').forEach(function(b){
    b.classList.toggle('active', b.dataset.mode === STATE.mode);
  });
}

function updateExamBar(){
  var bar = document.getElementById('examBar');
  if(STATE.mode === 'exam'){
    bar.classList.add('show');
    document.getElementById('examTotal').textContent = STATE.examQuestions.length;
    document.getElementById('examMax').textContent = calcMaxScore();
  }else{
    bar.classList.remove('show');
  }
}

function updateFilter(){
  document.querySelectorAll('.filter button[data-filter]').forEach(function(b){
    b.classList.toggle('active', b.dataset.filter === STATE.filter);
  });
}

function getCurrentQuestion(){
  var qs = getActiveQuestions();
  if(qs.length === 0) return null;
  if(STATE.currentIndex >= qs.length) STATE.currentIndex = qs.length - 1;
  if(STATE.currentIndex < 0) STATE.currentIndex = 0;
  return qs[STATE.currentIndex];
}

function renderQuestion(){
  var q = getCurrentQuestion();
  var qs = getActiveQuestions();
  var main = document.getElementById('main');
  var bottomNav = document.getElementById('bottomNav');
  var pi = document.getElementById('pi');

  if(qs.length === 0){
    main.innerHTML = '<div style=\"text-align:center;padding:60px 20px;color:#999\">此模式下暂无题目</div>';
    bottomNav.style.display = 'flex';
    pi.textContent = '0/0';
    return;
  }

  pi.textContent = (STATE.currentIndex + 1) + '/' + qs.length;

  var ans = (STATE.mode === 'exam') ? STATE.examAnswers[q.q] : STATE.answers[q.q];
  var answered = !!ans;
  var isCut = STATE.cutQuestions.indexOf(q.q) !== -1;

  var html = '<div class="qcard' + (answered ? (ans.correct ? ' correct' : ' wrong') : '') + (isCut ? ' cut' : '') + '">';

  // Cut button
  html += '<button class="cut-btn' + (isCut ? ' cut' : '') + '" data-q="' + q.q + '">' + (isCut ? '已斩' : '斩') + '</button>';

  // Header
  html += '<div class="qheader">';
  html += '<span class="qnum">第 ' + q.q + ' 题</span>';
  html += '<div class="qbadges">';
  html += '<span class="qtype">' + ({single:'单选',multi:'多选',tf:'判断'}[q.type]||'单选') + '</span>';
  html += '<span class="qmodule">' + (q.module||'') + '</span>';
  if(STATE.errorCount[q.q] >= 3) html += '<span style="background:#ffebee;color:#c62828">易错×' + STATE.errorCount[q.q] + '</span>';
  html += '</div></div>';

  // Question text
  html += '<div class="qtext">' + esc(q.text) + '</div>';

  // Options
  html += '<div class="options">';
  q.options.forEach(function(opt){
    var cls = 'option';
    if(answered){
      if(opt.label === q.answer) cls += ' reveal';
      else if(ans.selected.indexOf(opt.label) !== -1 && !ans.correct) cls += ' wrong';
      if(opt.label !== q.answer && ans.selected.indexOf(opt.label) === -1) cls += ' dim';
    }
    if(!answered) cls += ' selectable';
    html += '<div class="' + cls + '" data-label="' + opt.label + '" data-q="' + q.q + '">';
    html += '<span class="label">' + esc(opt.label) + '</span>';
    html += '<span>' + esc(opt.text) + '</span>';
    html += '</div>';
  });
  html += '</div>';

  // Feedback
  if(answered){
    var fbCls = ans.correct ? 'ok' : 'no';
    var fbIcon = ans.correct ? '✓ 回答正确' : '✗ 回答错误';
    html += '<div class="feedback show ' + fbCls + '">';
    html += '<div class="fb-label">' + fbIcon + '</div>';
    if(!ans.correct){
      html += '<div>正确答案：<b>' + esc(q.answer) + '</b></div>';
    }
    if(q.explanation){
      html += '<div style="margin-top:4px">' + esc(q.explanation) + '</div>';
    }
    if(q.module){
      html += '<div class="fb-module">📚 ' + esc(q.module) + '</div>';
    }
    html += '<button class="retry-btn" data-q="' + q.q + '">重做本题</button>';
    html += '</div>';
  }

  html += '</div>';
  main.innerHTML = html;

  bindEvents();
}

function esc(s){ if(!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ===== EVENTS =====
function bindEvents(){
  // Option clicks
  document.querySelectorAll('.option.selectable').forEach(function(el){
    el.addEventListener('click', function(){
      var qnum = parseInt(el.dataset.q);
      var label = el.dataset.label;
      var q = findQ(qnum);
      if(!q) return;

      var correct = (label === q.answer);
      var key = qnum;

      if(STATE.mode === 'exam'){
        STATE.examAnswers[key] = {selected: label, correct: correct, time: Date.now()};
      }else{
        STATE.answers[key] = {selected: label, correct: correct, time: Date.now()};
        if(correct){
          STATE.correctCount[key] = (STATE.correctCount[key]||0) + 1;
        }else{
          STATE.errorCount[key] = (STATE.errorCount[key]||0) + 1;
        }
      }

      renderAll();
      setTimeout(autoAdvance, 600);
    });
  });

  // Cut buttons
  document.querySelectorAll('.cut-btn').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var qnum = parseInt(el.dataset.q);
      var idx = STATE.cutQuestions.indexOf(qnum);
      if(idx === -1){
        STATE.cutQuestions.push(qnum);
      }else{
        STATE.cutQuestions.splice(idx, 1);
      }
      renderAll();
    });
  });

  // Retry buttons
  document.querySelectorAll('.retry-btn').forEach(function(el){
    el.addEventListener('click', function(e){
      e.stopPropagation();
      var qnum = parseInt(el.dataset.q);
      if(STATE.mode === 'exam'){
        delete STATE.examAnswers[qnum];
      }else{
        delete STATE.answers[qnum];
      }
      renderAll();
    });
  });
}

function findQ(qnum){
  var all = getAllQuestions();
  for(var i=0; i<all.length; i++){ if(all[i].q === qnum) return all[i]; }
  return null;
}

function autoAdvance(){
  var qs = getActiveQuestions();
  if(STATE.currentIndex < qs.length - 1){
    STATE.currentIndex++;
    renderAll();
  }
}

// Navigation
document.getElementById('prevBtn').addEventListener('click', function(){
  if(STATE.currentIndex > 0){ STATE.currentIndex--; renderAll(); }
});
document.getElementById('nextBtn').addEventListener('click', function(){
  var qs = getActiveQuestions();
  if(STATE.currentIndex < qs.length - 1){ STATE.currentIndex++; renderAll(); }
});

// Mode buttons
document.querySelectorAll('#modes button').forEach(function(btn){
  btn.addEventListener('click', function(){
    var mode = btn.dataset.mode;
    if(mode === 'exam'){
      document.getElementById('examModal').classList.add('show');
      return;
    }
    STATE.mode = mode;
    STATE.currentIndex = 0;
    STATE.filter = 'all';
    renderAll();
  });
});

// Filter buttons
document.querySelectorAll('.filter button[data-filter]').forEach(function(btn){
  btn.addEventListener('click', function(){
    STATE.filter = btn.dataset.filter;
    STATE.currentIndex = 0;
    renderAll();
  });
});

// Clear
document.getElementById('clearBtn').addEventListener('click', clearState);

// Settings drawer
document.getElementById('settingsBtn').addEventListener('click', function(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  renderCutList();
});
document.getElementById('overlay').addEventListener('click', function(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
});

function renderCutList(){
  var html = '';
  if(STATE.cutQuestions.length === 0){
    html = '<div style=\"color:#999;font-size:13px\">暂无斩题</div>';
  }else{
    STATE.cutQuestions.forEach(function(qnum){
      var q = findQ(qnum);
      var text = q ? q.text.substring(0, 30) : '题' + qnum;
      html += '<div class=\"cut-item\"><span>' + qnum + '. ' + esc(text) + '</span><button class=\"restore-btn\" data-q=\"' + qnum + '\">恢复</button></div>';
    });
  }
  document.getElementById('cutList').innerHTML = html;
  document.querySelectorAll('.restore-btn').forEach(function(b){
    b.addEventListener('click', function(){
      var idx = STATE.cutQuestions.indexOf(parseInt(b.dataset.q));
      if(idx !== -1) STATE.cutQuestions.splice(idx, 1);
      renderCutList();
      renderAll();
    });
  });
}

document.getElementById('restoreAll').addEventListener('click', function(){
  STATE.cutQuestions = [];
  renderCutList();
  renderAll();
});

// Submit exam
document.getElementById('submitExam').addEventListener('click', function(){
  if(confirm('确定交卷吗？')) finishExam();
});

// Keyboard
document.addEventListener('keydown', function(e){
  if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
    e.preventDefault();
    if(STATE.currentIndex > 0){ STATE.currentIndex--; renderAll(); }
  }else if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){
    e.preventDefault();
    var qs = getActiveQuestions();
    if(STATE.currentIndex < qs.length - 1){ STATE.currentIndex++; renderAll(); }
  }
});

// Touch swipe
var tx=0, ty=0;
document.addEventListener('touchstart', function(e){ tx=e.touches[0].clientX; ty=e.touches[0].clientY; });
document.addEventListener('touchend', function(e){
  var dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){
    var qs=getActiveQuestions();
    if(dx<0&&STATE.currentIndex<qs.length-1){STATE.currentIndex++;renderAll()}
    else if(dx>0&&STATE.currentIndex>0){STATE.currentIndex--;renderAll()}
  }
});

// ===== EXAM =====
function closeExamModal(){ document.getElementById('examModal').classList.remove('show'); }
function startExam(){
  var total = parseInt(document.getElementById('examQCount').value) || 0;
  var timeLimit = parseInt(document.getElementById('examTime').value) || 0;
  closeExamModal();

  // Build exam question set
  var all = getAllQuestions();
  var singles = all.filter(function(q){ return q.type === 'single'; });
  var multis = all.filter(function(q){ return q.type === 'multi'; });
  var tfs = all.filter(function(q){ return q.type === 'tf'; });

  var targetTotal = total || all.length;
  // 60% single, 30% multi, 10% tf
  var nSingle = Math.round(targetTotal * 0.6);
  var nMulti = Math.round(targetTotal * 0.3);
  var nTf = targetTotal - nSingle - nMulti;

  // Ensure we don't exceed available
  nSingle = Math.min(nSingle, singles.length);
  nMulti = Math.min(nMulti, multis.length);
  nTf = Math.min(nTf, tfs.length);

  var examQs = [];
  examQs = examQs.concat(shuffle(singles).slice(0, nSingle));
  examQs = examQs.concat(shuffle(multis).slice(0, nMulti));
  examQs = examQs.concat(shuffle(tfs).slice(0, nTf));
  examQs = shuffle(examQs);

  STATE.mode = 'exam';
  STATE.examQuestions = examQs;
  STATE.examAnswers = {};
  STATE.examStartTime = Date.now();
  STATE.currentIndex = 0;
  STATE.filter = 'all';

  document.getElementById('examTotal').textContent = examQs.length;
  document.getElementById('examMax').textContent = calcMaxScore();

  if(timeLimit > 0 && STATE.examTimer) clearInterval(STATE.examTimer);
  if(timeLimit > 0){
    var endTime = Date.now() + timeLimit * 60000;
    STATE.examTimer = setInterval(function(){
      var remain = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
      document.getElementById('examRemain').textContent = Math.floor(remain/60) + ':' + (remain%60<10?'0':'') + (remain%60);
      if(remain <= 0) finishExam();
    }, 1000);
    document.getElementById('examRemain').textContent = timeLimit + ':00';
  }else{
    document.getElementById('examRemain').textContent = examQs.length;
  }

  renderAll();
}

function calcMaxScore(){
  var total = 0;
  STATE.examQuestions.forEach(function(q){
    if(q.type === 'multi') total += 2;
    else total += 1; // single or tf = 1
  });
  return total;
}

function finishExam(){
  if(STATE.examTimer) clearInterval(STATE.examTimer);

  var total = STATE.examQuestions.length;
  var answered = Object.keys(STATE.examAnswers).length;
  var correct = 0;
  var wrong = 0;
  var score = 0;
  var wrongQs = [];

  STATE.examQuestions.forEach(function(q){
    var ans = STATE.examAnswers[q.q];
    if(!ans) return;
    if(ans.correct){
      correct++;
      score += (q.type === 'multi') ? 2 : 1;
    }else{
      wrong++;
      wrongQs.push(q);
      // Record in error tracking
      STATE.errorCount[q.q] = (STATE.errorCount[q.q]||0) + 1;
      STATE.answers[q.q] = ans;
    }
  });

  var maxScore = calcMaxScore();
  var pct = maxScore > 0 ? Math.round(score/maxScore*100) : 0;

  // Save exam history
  STATE.examHistory.push({
    date: new Date().toISOString(),
    score: score,
    maxScore: maxScore,
    correct: correct,
    wrong: wrong,
    total: total,
    pct: pct
  });

  // Render result
  var main = document.getElementById('main');
  var result = document.getElementById('examResult');
  var html = '<h2>' + (pct >= 60 ? '🎉 通过' : '💪 继续加油') + '</h2>';
  html += '<div class="score">' + score + '<span style="font-size:20px">/' + maxScore + '</span></div>';
  html += '<div class="detail">';
  html += '正确率：' + pct + '% &nbsp;|&nbsp; 答对：' + correct + ' &nbsp;|&nbsp; 答错：' + wrong + ' &nbsp;|&nbsp; 未答：' + (total-answered);
  html += '</div>';

  if(wrongQs.length > 0){
    html += '<div class="wrong-list"><b>错题回顾：</b>';
    wrongQs.forEach(function(q){
      var ans = STATE.examAnswers[q.q];
      html += '<div style="margin:8px 0;font-size:12px">';
      html += '<b>' + q.q + '.</b> ' + esc(q.text.substring(0,60)) + '... ';
      html += '<span style="color:#f44336">(选:' + (ans?ans.selected:'未答') + ' 正确:' + q.answer + ')</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<button style="margin-top:16px;padding:10px 24px;background:#1976d2;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer" onclick="exitExam()">返回练习</button>';

  main.innerHTML = '';
  result.innerHTML = html;
  result.classList.add('show');
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('examBar').classList.remove('show');

  saveState();
}

function exitExam(){
  STATE.mode = 'sequential';
  STATE.examQuestions = [];
  STATE.examAnswers = {};
  if(STATE.examTimer) clearInterval(STATE.examTimer);
  document.getElementById('examResult').classList.remove('show');
  document.getElementById('examResult').innerHTML = '';
  document.getElementById('bottomNav').style.display = 'flex';
  STATE.currentIndex = 0;
  renderAll();
}

// ===== INIT =====
document.getElementById('quizTitle').textContent = QUIZ_TITLE;
loadState();
renderAll();
</script>
